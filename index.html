<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When You Death</title>  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>When You Death</h1>  <div id="input-area">
        <label for="birthYear">Birth Year:</label>
        <input type="number" id="birthYear" min="1900" max="2100" value="2000"><br><br>

        <label for="birthMonth">Birth Month:</label>
        <input type="number" id="birthMonth" min="1" max="12" value="1"><br><br>

        <label for="birthDay">Birth Day:</label>
        <input type="number" id="birthDay" min="1" max="31" value="1"><br><br>

        <label for="smoking">Smoking (packs per day):</label>
        <input type="number" id="smoking" min="0" value="0"><br><br>

        <label for="drinking">Drinking (drinks per week):</label>
        <input type="number" id="drinking" min="0" value="0"><br><br>

        <button onclick="calculate()">Calculate</button>
    </div>

    <div id="result-area" style="display:none;">
        <p>Time Remaining:</p>
        <p id="timer"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
